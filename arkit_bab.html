<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Babylon.js  Shapes Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
  <style>
    html, body, #renderCanvas { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #111; }
    #info {
      position: fixed; top: 20px; left: 20px;
      color: white; font-family: monospace;
      background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px;
      pointer-events: none; font-size: 1.2em; z-index: 100;
    }
    .highlight { color: #00ff00; font-weight: bold; }
    .category  { color: #ffaa00; font-weight: bold; }
    #controls {
      position: fixed; bottom: 20px; left: 20px;
      background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px;
      z-index: 100; color: white; font-family: monospace;
    }
    select {
      background: #333; color: white; border: 1px solid #666;
      padding: 5px; font-family: monospace; margin: 5px;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="info">
    <div> Shapes Demo — Babylon.js</div>
    <div id="model-name" style="color:#aaf;font-size:0.85em"></div>
    <div id="status">Loading model…</div>
    <div id="current-shape" class="highlight"></div>
    <div id="shape-count"></div>
  </div>

  <div id="controls">
    <div>Mode:
      <select id="modeSelect">
        <option value="cycle">Cycle All</option>
        <option value="eyes">Eyes Only</option>
        <option value="mouth">Mouth Only</option>
        <option value="brows">Brows Only</option>
      </select>
    </div>
    <div>Speed:
      <select id="speedSelect">
        <option value="2.0">Slow</option>
        <option value="1.5" selected>Normal</option>
        <option value="1.0">Fast</option>
        <option value="0.5">Very Fast</option>
      </select>
    </div>
  </div>

  <script type="module">

    const VRM_MODELS = ["models/AIAN/AIAN_F_1_Busi.vrm","models/AIAN/AIAN_F_1_Casual.vrm","models/AIAN/AIAN_F_1_Medi.vrm","models/AIAN/AIAN_F_1_Milit.vrm","models/AIAN/AIAN_F_1_Util.vrm","models/AIAN/AIAN_F_2_Busi.vrm","models/AIAN/AIAN_F_2_Casual.vrm","models/AIAN/AIAN_F_2_Medi.vrm","models/AIAN/AIAN_F_2_Milit.vrm","models/AIAN/AIAN_F_2_Util.vrm","models/AIAN/AIAN_M_1_Busi.vrm","models/AIAN/AIAN_M_1_Casual.vrm","models/AIAN/AIAN_M_1_Medi.vrm","models/AIAN/AIAN_M_1_Milit.vrm","models/AIAN/AIAN_M_1_Util.vrm","models/AIAN/AIAN_M_2_Busi.vrm","models/AIAN/AIAN_M_2_Casual.vrm","models/AIAN/AIAN_M_2_Medi.vrm","models/AIAN/AIAN_M_2_Milit.vrm","models/AIAN/AIAN_M_2_Util.vrm","models/Asian/Asian_F_1_Busi.vrm","models/Asian/Asian_F_1_Casual.vrm","models/Asian/Asian_F_1_Default.vrm","models/Asian/Asian_F_1_Medi.vrm","models/Asian/Asian_F_1_Milit.vrm","models/Asian/Asian_F_1_Util.vrm","models/Asian/Asian_F_2_Busi.vrm","models/Asian/Asian_F_2_Casual.vrm","models/Asian/Asian_F_2_Default.vrm","models/Asian/Asian_F_2_Medi.vrm","models/Asian/Asian_F_2_Milit.vrm","models/Asian/Asian_F_2_Util.vrm","models/Asian/Asian_F_3_Busi.vrm","models/Asian/Asian_F_3_Casual.vrm","models/Asian/Asian_F_3_Default.vrm","models/Asian/Asian_F_3_Medi.vrm","models/Asian/Asian_F_3_Milit.vrm","models/Asian/Asian_F_3_Util.vrm","models/Asian/Asian_M_1_Busi.vrm","models/Asian/Asian_M_1_Casual.vrm","models/Asian/Asian_M_1_Default.vrm","models/Asian/Asian_M_1_Medi.vrm","models/Asian/Asian_M_1_Milit.vrm","models/Asian/Asian_M_1_Util.vrm","models/Asian/Asian_M_2_Busi.vrm","models/Asian/Asian_M_2_Casual.vrm","models/Asian/Asian_M_2_Default.vrm","models/Asian/Asian_M_2_Medi.vrm","models/Asian/Asian_M_2_Milit.vrm","models/Asian/Asian_M_2_Util.vrm","models/Asian/Asian_M_3_Busi.vrm","models/Asian/Asian_M_3_Casual.vrm","models/Asian/Asian_M_3_Default.vrm","models/Asian/Asian_M_3_Medi.vrm","models/Asian/Asian_M_3_Milit.vrm","models/Asian/Asian_M_3_Util.vrm","models/Black/Black_F_1_Busi.vrm","models/Black/Black_F_1_Casual.vrm","models/Black/Black_F_1_Default.vrm","models/Black/Black_F_1_Medi.vrm","models/Black/Black_F_1_Milit.vrm","models/Black/Black_F_1_Util.vrm","models/Black/Black_F_2_Busi.vrm","models/Black/Black_F_2_Casual.vrm","models/Black/Black_F_2_Default.vrm","models/Black/Black_F_2_Medi.vrm","models/Black/Black_F_2_Milit.vrm","models/Black/Black_F_2_Util.vrm","models/Black/Black_F_3_Busi.vrm","models/Black/Black_F_3_Casual.vrm","models/Black/Black_F_3_Default.vrm","models/Black/Black_F_3_Medi.vrm","models/Black/Black_F_3_Milit.vrm","models/Black/Black_F_3_Util.vrm","models/Black/Black_M_1_Busi.vrm","models/Black/Black_M_1_Casual.vrm","models/Black/Black_M_1_Default.vrm","models/Black/Black_M_1_Medi.vrm","models/Black/Black_M_1_Milit.vrm","models/Black/Black_M_1_Util.vrm","models/Black/Black_M_2_Busi.vrm","models/Black/Black_M_2_Casual.vrm","models/Black/Black_M_2_Default.vrm","models/Black/Black_M_2_Medi.vrm","models/Black/Black_M_2_Milit.vrm","models/Black/Black_M_2_Util.vrm","models/Black/Black_M_3_Busi.vrm","models/Black/Black_M_3_Casual.vrm","models/Black/Black_M_3_Default.vrm","models/Black/Black_M_3_Medi.vrm","models/Black/Black_M_3_Milit.vrm","models/Black/Black_M_3_Util.vrm","models/Hispanic/Hispanic_F_1_Busi.vrm","models/Hispanic/Hispanic_F_1_Casual.vrm","models/Hispanic/Hispanic_F_1_Default.vrm","models/Hispanic/Hispanic_F_1_Medi.vrm","models/Hispanic/Hispanic_F_1_Milit.vrm","models/Hispanic/Hispanic_F_1_Util.vrm","models/Hispanic/Hispanic_F_2_Busi.vrm","models/Hispanic/Hispanic_F_2_Casual.vrm","models/Hispanic/Hispanic_F_2_Default.vrm","models/Hispanic/Hispanic_F_2_Medi.vrm","models/Hispanic/Hispanic_F_2_Milit.vrm","models/Hispanic/Hispanic_F_2_Util.vrm","models/Hispanic/Hispanic_F_3_Busi.vrm","models/Hispanic/Hispanic_F_3_Casual.vrm","models/Hispanic/Hispanic_F_3_Default.vrm","models/Hispanic/Hispanic_F_3_Medi.vrm","models/Hispanic/Hispanic_F_3_Milit.vrm","models/Hispanic/Hispanic_F_3_Util.vrm","models/Hispanic/Hispanic_M_1_Busi.vrm","models/Hispanic/Hispanic_M_1_Casual.vrm","models/Hispanic/Hispanic_M_1_Default.vrm","models/Hispanic/Hispanic_M_1_Medi.vrm","models/Hispanic/Hispanic_M_1_Milit.vrm","models/Hispanic/Hispanic_M_1_Util.vrm","models/Hispanic/Hispanic_M_2_Busi.vrm","models/Hispanic/Hispanic_M_2_Casual.vrm","models/Hispanic/Hispanic_M_2_Default.vrm","models/Hispanic/Hispanic_M_2_Medi.vrm","models/Hispanic/Hispanic_M_2_Milit.vrm","models/Hispanic/Hispanic_M_2_Util.vrm","models/Hispanic/Hispanic_M_3_Busi.vrm","models/Hispanic/Hispanic_M_3_Casual.vrm","models/Hispanic/Hispanic_M_3_Default.vrm","models/Hispanic/Hispanic_M_3_Medi.vrm","models/Hispanic/Hispanic_M_3_Milit.vrm","models/Hispanic/Hispanic_M_3_Util.vrm","models/MENA/MENA_F_1_Busi.vrm","models/MENA/MENA_F_1_Casual.vrm","models/MENA/MENA_F_1_Medi.vrm","models/MENA/MENA_F_1_Milit.vrm","models/MENA/MENA_F_1_Util.vrm","models/MENA/MENA_F_2_Busi.vrm","models/MENA/MENA_F_2_Casual.vrm","models/MENA/MENA_F_2_Medi.vrm","models/MENA/MENA_F_2_Milit.vrm","models/MENA/MENA_F_2_Util.vrm","models/MENA/MENA_M_1_Busi.vrm","models/MENA/MENA_M_1_Casual.vrm","models/MENA/MENA_M_1_Medi.vrm","models/MENA/MENA_M_1_Milit.vrm","models/MENA/MENA_M_1_Util.vrm","models/MENA/MENA_M_2_Busi.vrm","models/MENA/MENA_M_2_Casual.vrm","models/MENA/MENA_M_2_Medi.vrm","models/MENA/MENA_M_2_Milit.vrm","models/MENA/MENA_M_2_Util.vrm","models/MENA/MENA_M_3_Busi.vrm","models/MENA/MENA_M_3_Casual.vrm","models/MENA/MENA_M_3_Medi.vrm","models/MENA/MENA_M_3_Milit.vrm","models/MENA/MENA_M_3_Util.vrm","models/NHPI/NHPI_M_1_Busi.vrm","models/NHPI/NHPI_M_1_Casual.vrm","models/NHPI/NHPI_M_1_Medi.vrm","models/NHPI/NHPI_M_1_Milit.vrm","models/NHPI/NHPI_M_1_Util.vrm","models/NHPI/NHPI_M_2_Busi.vrm","models/NHPI/NHPI_M_2_Casual.vrm","models/NHPI/NHPI_M_2_Medi.vrm","models/NHPI/NHPI_M_2_Milit.vrm","models/NHPI/NHPI_M_2_Util.vrm","models/White/White_F_1_Busi.vrm","models/White/White_F_1_Casual.vrm","models/White/White_F_1_Default.vrm","models/White/White_F_1_Medi.vrm","models/White/White_F_1_Milit.vrm","models/White/White_F_1_Util.vrm","models/White/White_F_2_Busi.vrm","models/White/White_F_2_Casual.vrm","models/White/White_F_2_Default.vrm","models/White/White_F_2_Medi.vrm","models/White/White_F_2_Milit.vrm","models/White/White_F_2_Util.vrm","models/White/White_F_3_Busi.vrm","models/White/White_F_3_Casual.vrm","models/White/White_F_3_Default.vrm","models/White/White_F_3_Medi.vrm","models/White/White_F_3_Milit.vrm","models/White/White_F_3_Util.vrm","models/White/White_M_1_Busi.vrm","models/White/White_M_1_Casual.vrm","models/White/White_M_1_Default.vrm","models/White/White_M_1_Medi.vrm","models/White/White_M_1_Milit.vrm","models/White/White_M_1_Util.vrm","models/White/White_M_2_Busi.vrm","models/White/White_M_2_Casual.vrm","models/White/White_M_2_Default.vrm","models/White/White_M_2_Medi.vrm","models/White/White_M_2_Milit.vrm","models/White/White_M_2_Util.vrm","models/White/White_M_3_Busi.vrm","models/White/White_M_3_Casual.vrm","models/White/White_M_3_Default.vrm","models/White/White_M_3_Medi.vrm","models/White/White_M_3_Milit.vrm","models/White/White_M_3_Util.vrm"];
    const VRM_FILE = VRM_MODELS[Math.floor(Math.random() * VRM_MODELS.length)];

    // ---------------------------------------------------------------------------
    //  shape catalogue (matches _demo.html exactly)
    // ---------------------------------------------------------------------------
    const _SHAPES = {
      eyes:        ['eyeBlinkLeft','eyeBlinkRight','eyeWideLeft','eyeWideRight','eyeSquintLeft','eyeSquintRight'],
      jaw:         ['jawOpen','jawForward','jawLeft','jawRight'],
      mouth:       ['mouthClose','mouthFunnel','mouthPucker','mouthLeft','mouthRight',
                    'mouthSmileLeft','mouthSmileRight','mouthFrownLeft','mouthFrownRight',
                    'mouthDimpleLeft','mouthDimpleRight','mouthStretchLeft','mouthStretchRight',
                    'mouthUpperUpLeft','mouthUpperUpRight','mouthLowerDownLeft','mouthLowerDownRight',
                    'mouthPressLeft','mouthPressRight'],
      brows:       ['browDownLeft','browDownRight','browOuterUpLeft','browOuterUpRight','browInnerUp'],
      nose:        ['noseSneerLeft','noseSneerRight'],
      cheeks:      ['cheekPuff','cheekSquintLeft','cheekSquintRight'],
      mouth_extra: ['mouthRollLower','mouthRollUpper','mouthShrugLower','mouthShrugUpper'],
      tongue:      ['tongueOut'],
      eye_look:    ['eyeLookDownLeft','eyeLookDownRight','eyeLookInLeft','eyeLookInRight',
                    'eyeLookOutLeft','eyeLookOutRight','eyeLookUpLeft','eyeLookUpRight'],
    };

    // Teeth morph targets driven alongside face shapes
    const TEETH_MAP = {
      jawOpen:     'h_teeth.t_MouthOpen_h',
      mouthFunnel: 'h_teeth.t_Shout_h',
      mouthClose:  'h_teeth.t_MPB_h',
    };

    // ---------------------------------------------------------------------------
    // DOM
    // ---------------------------------------------------------------------------
    const statusEl       = document.getElementById('status');
    const currentShapeEl = document.getElementById('current-shape');
    const shapeCountEl   = document.getElementById('shape-count');
    const modeSelect     = document.getElementById('modeSelect');
    const speedSelect    = document.getElementById('speedSelect');

    // ---------------------------------------------------------------------------
    // Load VRM loader from CDN
    // ---------------------------------------------------------------------------
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://xuhuisheng.github.io/babylonjs-vrm/babylon-vrm-loader.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });

    // ---------------------------------------------------------------------------
    // Scene setup
    // ---------------------------------------------------------------------------
    const canvas = document.getElementById('renderCanvas');
    const engine = new BABYLON.Engine(canvas, true);
    engine.setHardwareScalingLevel(1);
    const scene = new BABYLON.Scene(engine);

    // Close-up face camera
    const camera = new BABYLON.ArcRotateCamera('cam', Math.PI / 2, Math.PI / 2 - 0.12, 1.5,
      new BABYLON.Vector3(0, 1.55, 0), scene);
    camera.attachControl(canvas, true);
    camera.lowerRadiusLimit = 0.3;
    camera.upperRadiusLimit = 8;

    new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);
    const dirLight = new BABYLON.DirectionalLight('dir', new BABYLON.Vector3(-1, -2, -1), scene);
    dirLight.intensity = 0.5;
    // Soft front fill to illuminate facial detail
    const fillLight = new BABYLON.PointLight('fill', new BABYLON.Vector3(0, 1.6, 1.5), scene);
    fillLight.intensity = 0.6;

    // ---------------------------------------------------------------------------
    // Load VRM
    // ---------------------------------------------------------------------------
    document.getElementById('model-name').textContent = VRM_FILE.replace('models/', '').replace('.vrm', '');
    statusEl.textContent = 'Loading VRM…';
    await BABYLON.ImportMeshAsync(VRM_FILE, scene);
    statusEl.textContent = 'Scanning morph targets…';

    // Log all mesh names + morph counts so we can confirm H_DDS_HighRes is present
    console.log('[_bab] meshes:',
      scene.meshes.map(m => `${m.name} (morphs: ${m.morphTargetManager?.numTargets ?? 0})`));

    // ---------------------------------------------------------------------------
    // Build name → MorphTarget map for a mesh
    // ---------------------------------------------------------------------------
    function buildMorphMap(mesh) {
      const map = new Map();
      const mgr = mesh?.morphTargetManager;
      if (!mgr) return map;
      for (let i = 0; i < mgr.numTargets; i++) {
        const t = mgr.getTarget(i);
        map.set(t.name, t);
      }
      return map;
    }

    const faceMesh      = scene.getMeshByName('H_DDS_HighRes');
    const teethDownMesh = scene.getMeshByName('h_TeethDown');
    const teethUpMesh   = scene.getMeshByName('h_TeethUp');

    if (!faceMesh) {
      statusEl.textContent = 'H_DDS_HighRes not found — check console for mesh names';
    }

    const faceMap      = buildMorphMap(faceMesh);
    const teethDownMap = buildMorphMap(teethDownMesh);
    const teethUpMap   = buildMorphMap(teethUpMesh);

    // ---------------------------------------------------------------------------
    // Audit which of the 52  shapes are present
    // ---------------------------------------------------------------------------
    const allShapes = Object.values(_SHAPES).flat();
    const available = allShapes.filter(s => faceMap.has(s));

    console.group('[_bab]  blend shape audit');
    for (const [cat, shapes] of Object.entries(_SHAPES)) {
      const present = shapes.filter(s => faceMap.has(s));
      const missing = shapes.filter(s => !faceMap.has(s));
      console.group(`${cat} (${present.length}/${shapes.length})`);
      if (present.length) console.log('%cpresent: ' + present.join(', '), 'color:#0f0');
      if (missing.length) console.log('%cmissing: ' + missing.join(', '), 'color:#f66');
      console.groupEnd();
    }
    console.log(`Total available: ${available.length} / 52`);
    console.groupEnd();

    shapeCountEl.textContent = `Available: ${available.length} of 52  shapes`;
    statusEl.textContent = faceMesh
      ? `Ready — ${available.length} shapes found. Cycling…`
      : 'Face mesh not found';

    // ---------------------------------------------------------------------------
    // Apply a shape weight to face (+ teeth if mapped)
    // ---------------------------------------------------------------------------
    function applyShape(name, value) {
      const ft = faceMap.get(name);
      if (ft) ft.influence = value;

      const teethName = TEETH_MAP[name];
      if (teethName) {
        const td = teethDownMap.get(teethName);
        const tu = teethUpMap.get(teethName);
        if (td) td.influence = value;
        if (tu) tu.influence = value;
      }
    }

    function getShapesForMode(mode) {
      switch (mode) {
        case 'eyes':  return _SHAPES.eyes.filter(s => faceMap.has(s));
        case 'mouth': return _SHAPES.mouth.filter(s => faceMap.has(s));
        case 'brows': return _SHAPES.brows.filter(s => faceMap.has(s));
        default:      return available;
      }
    }

    function getCategoryFor(shape) {
      for (const [cat, shapes] of Object.entries(_SHAPES)) {
        if (shapes.includes(shape)) return cat.toUpperCase();
      }
      return 'OTHER';
    }

    // ---------------------------------------------------------------------------
    // Tick — sine-wave cycling (direct port of _demo.html tick())
    // ---------------------------------------------------------------------------
    let currentIndex = 0;
    let elapsed = 0;
    let lastMs = performance.now();

    scene.onBeforeRenderObservable.add(() => {
      if (!faceMesh || available.length === 0) return;

      const now = performance.now();
      const dt  = (now - lastMs) / 1000;
      lastMs = now;

      const duration = parseFloat(speedSelect.value);
      const shapes   = getShapesForMode(modeSelect.value);

      elapsed += dt;

      if (elapsed > duration) {
        elapsed = 0;
        applyShape(shapes[currentIndex], 0);
        currentIndex = (currentIndex + 1) % shapes.length;
      }

      const value = Math.max(0, Math.sin(Math.PI * (elapsed / duration)));
      const name  = shapes[currentIndex];
      applyShape(name, value);

      currentShapeEl.innerHTML =
        `<span class="category">${getCategoryFor(name)}</span>: ${name} : ${value.toFixed(2)}`;
    });

    modeSelect.addEventListener('change', () => {
      for (const s of allShapes) applyShape(s, 0);
      currentIndex = 0;
      elapsed = 0;
    });

    // ---------------------------------------------------------------------------
    // Render loop
    // ---------------------------------------------------------------------------
    engine.runRenderLoop(() => scene.render());
    window.addEventListener('resize', () => engine.resize());

  </script>
</body>
</html>
