<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Babylon.js VRM Player</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
  <style>
    html, body, #renderCanvas { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #111; }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <script type="module">

    const params    = new URLSearchParams(location.search);
    const VRM_FILE  = params.get('model') || 'models/Seed-san.vrm';
    const HASH_VRMA = location.hash.slice(1) || null;

    window.animationReady = false;

    // Load VRM 1.0 / VRMC_vrm_animation extension before the scene starts.
    await new Promise(r => {
      const s = document.createElement('script');
      s.src = 'vrm1-loader.js';
      s.onload = r;
      document.head.appendChild(s);
    });

    const canvas = document.getElementById('renderCanvas');
    const engine = new BABYLON.Engine(canvas, true);
    const scene  = new BABYLON.Scene(engine);
    window.engine = engine;
    window.scene  = scene;

    // LHS (default Babylon) — the glTF loader applies a 180°Y root rotation to
    // __root__, so the VRM character faces -Z in world space.
    // Match babplay.html: ArcRotateCamera at alpha=-π/2 sits on the -Z side looking in +Z.
    const camera = new BABYLON.ArcRotateCamera(
      'cam', -Math.PI / 2, Math.PI / 2 - 0.12, 3,
      new BABYLON.Vector3(0, 0.9, 0), scene
    );

    scene.clearColor = BABYLON.Color3.FromHexString('#001a33').toColor4(1);
    new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);

    // Load VRM.
    await BABYLON.SceneLoader.ImportMeshAsync(null, '', VRM_FILE, scene, undefined, '.glb');

    const vrmManager    = scene.metadata?.vrmManagers?.[0];
    const humanoidBones = vrmManager?.humanoidBone?.nodeMap;
    if (!humanoidBones) throw new Error('[BAB] No VRM humanoid bones found — is vrm1-loader.js loaded?');
    console.log('[BAB] Humanoid bones:', Object.keys(humanoidBones).join(', '));

    // Log the loader-applied root rotation for diagnostics.
    // In LHS mode the loader applies 180°Y to __root__ — keep it; it is correct.
    {
      const hips = humanoidBones['hips'];
      let root = hips;
      while (root.parent &&
             typeof root.parent.getClassName === 'function' &&
             root.parent.getClassName() !== 'Scene') {
        root = root.parent;
      }
      const r = root.rotationQuaternion;
      console.log(`[BAB] VRM root "${root.name}" loader rotation: `
        + `(${r?.x?.toFixed(3)}, ${r?.y?.toFixed(3)}, ${r?.z?.toFixed(3)}, ${r?.w?.toFixed(3)})`);
    }

    // Force one render so bone absolute positions are computed before we read them.
    scene.render();

    // Zero out hips X/Z translation every frame (keep Y for vertical bob).
    // Matches what animate.html does: hips.position.set(0, hips.position.y, 0)
    // Also force skeleton matrix recompute so TransformNode animation propagates to mesh skinning.
    // (_markAsDirty is the correct method name in Babylon v8.53 CDN build.)
    scene.onBeforeRenderObservable.add(() => {
      const hips = humanoidBones['hips'];
      if (hips) {
        hips.position.x = 0;
        hips.position.z = 0;
      }
      for (const s of scene.skeletons) if (s?._markAsDirty) s._markAsDirty();
    });

    // ── Animation loader ──────────────────────────────────────────────────────
    async function playAnimation(url) {
      try {
        if (!url) return;

        const ac = await BABYLON.SceneLoader.LoadAssetContainerAsync(
          '', url, scene, undefined, '.glb'
        );
        const animGroup = ac.animationGroups[0];
        if (!animGroup) { console.warn('[BAB] No animation group in VRMA'); return; }

        // VRM1AnimationExtension writes to scene.metadata.vrmAnimationManagers
        // (the global extension fires even for LoadAssetContainerAsync).
        // Use the most recently pushed entry to get this VRMA's maps.
        const mgrs    = scene.metadata?.vrmAnimationManagers ?? [];
        const vrmAnim = mgrs[mgrs.length - 1];
        const animMap = vrmAnim?.animationMap; // vrmaNodeIndex → boneName
        const nameMap = vrmAnim?.nameMap;      // vrmaNodeName  → boneName
        console.log('[BAB] animMap size:', animMap?.size, '  nameMap size:', nameMap?.size);

        // Compute hips height scale: model hips Y / first-keyframe hips Y in VRMA.
        let hipsScaleY = 1;
        {
          const modelHipsY = humanoidBones['hips']?.getAbsolutePosition()?.y ?? 1;
          const hipsTa = animGroup.targetedAnimations.find(ta => {
            const idx = ta.target.metadata?.gltf?.index ?? ta.target._gltfEntity?.index;
            const nm  = animMap?.get(idx) ?? nameMap?.get(ta.target.name);
            return nm === 'hips' &&
              (ta.animation.targetProperty === 'position' ||
               ta.animation.targetProperty === 'translation');
          });
          const vrmaHipsY = hipsTa?.animation?.getKeys()?.[0]?.value?.y;
          if (vrmaHipsY && Math.abs(vrmaHipsY) > 1e-4) {
            hipsScaleY = modelHipsY / vrmaHipsY;
            console.log('[BAB] hips scale:', hipsScaleY.toFixed(4),
                        '  (modelY:', modelHipsY.toFixed(4), '/ vrmaY:', vrmaHipsY.toFixed(4) + ')');
          }
        }

        const remapped = new BABYLON.AnimationGroup('vrma-retargeted', scene);
        let mapped = 0;

        animGroup.targetedAnimations.forEach(targeted => {
          // Resolve VRMA node → humanoid bone name via index then name fallback.
          const vrmaIdx  = targeted.target.metadata?.gltf?.index ??
                           targeted.target._gltfEntity?.index;
          const boneName = animMap?.get(vrmaIdx) ?? nameMap?.get(targeted.target.name);
          const boneNode = humanoidBones?.[boneName];
          if (!boneNode) return;

          const anim = targeted.animation.clone();

          if (anim.dataType === BABYLON.Animation.ANIMATIONTYPE_QUATERNION) {
            // VRMA quaternions are in glTF RHS space.  The glTF loader applies a
            // 180°Y rotation to __root__ (LHS mode).  To match this root correction
            // we conjugate by 180°Y: (x,y,z,w) → (-x,y,-z,w).
            const keys = anim.getKeys();
            keys.forEach(kf => {
              kf.value = new BABYLON.Quaternion(
                -kf.value.x, kf.value.y, -kf.value.z, kf.value.w
              );
            });
            anim.setKeys(keys);
          } else if (boneName === 'hips' &&
              (anim.targetProperty === 'position' ||
               anim.targetProperty === 'translation')) {
            // Scale hips height to match this model and negate X/Z to account for
            // the 180°Y root rotation (local +X/-Z becomes world -X/+Z).
            const keys = anim.getKeys();
            keys.forEach(kf => {
              kf.value = new BABYLON.Vector3(
                -kf.value.x * hipsScaleY,
                 kf.value.y * hipsScaleY,
                -kf.value.z * hipsScaleY
              );
            });
            anim.setKeys(keys);
          }

          remapped.addTargetedAnimation(anim, boneNode);
          mapped++;
        });

        remapped.start(true);
        window.remappedGroup = remapped;
        console.log('[BAB] Animation started —', mapped, 'channels retargeted');

      } catch (e) {
        console.error('[BAB] playAnimation error:', e);
      } finally {
        window.animationReady = true;
      }
    }

    if (HASH_VRMA) await playAnimation(HASH_VRMA);
    else window.animationReady = true;

    // ── Bone-quaternion export for Puppeteer tests ────────────────────────────
    // Returns { boneName: { q:{x,y,z,w}, pos:{x,y,z} } } for all humanoid bones.
    // Quaternions are raw Babylon local-bone values (XZ-negation applied above).
    // The test harness checks dot(BAB, conj180Y(AF)) ≈ 1.
    window.getBoneQuats = (t) => {
      if (window.remappedGroup) {
        const fps = window.remappedGroup.targetedAnimations[0]
                      ?.animation?.framePerSecond ?? 60;
        window.remappedGroup.pause();
        window.remappedGroup.goToFrame(t * fps);
      }
      for (const s of scene.skeletons) if (s?._markAsDirty) s._markAsDirty();
      scene.render();
      const out = {};
      Object.keys(humanoidBones).forEach(name => {
        const node = humanoidBones[name];
        if (!node) return;
        const rq = node.rotationQuaternion ?? BABYLON.Quaternion.Identity();
        const wp = node.getAbsolutePosition();
        out[name] = {
          q:   { x: +rq.x.toFixed(4), y: +rq.y.toFixed(4),
                 z: +rq.z.toFixed(4), w: +rq.w.toFixed(4) },
          pos: { x: +wp.x.toFixed(4), y: +wp.y.toFixed(4), z: +wp.z.toFixed(4) },
        };
      });
      return out;
    };

    engine.runRenderLoop(() => { scene.render(); });
  </script>
</body>
</html>
