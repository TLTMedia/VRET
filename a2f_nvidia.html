<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A2F → VRM Lip Sync (Babylon.js)</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      #renderCanvas {
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      #ui {
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 10;
        padding: 8px;
        background: rgba(255, 255, 255, 0.9);
        font-family: system-ui, sans-serif;
        font-size: 14px;
        max-width: 360px;
      }
      #ui row {
        display: block;
        margin-bottom: 6px;
      }
      #status {
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div><strong>A2F → VRM Lip Sync</strong></div>
      <div>
        <label>
          Load JSON:
          <input id="jsonFile" type="file" accept="application/json,.json" />
        </label>
      </div>
      <div>
        <label>
          Load Audio:
          <input id="audioFile" type="file" accept="audio/wav,audio/*" />
        </label>
      </div>
      <div>
        <button id="startBtn" type="button">Start</button>
        <button id="playBtn" type="button">Play</button>
        <button id="stopBtn" type="button">Stop</button>
      </div>
      <div id="status">Status: booting…</div>
    </div>

    <canvas id="renderCanvas"></canvas>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://unpkg.com/babylon-vrm-loader@2.0.0/dist/index.js"></script>
    <script src="./a2f_nvidia.js"></script>
  </body>
</html>
