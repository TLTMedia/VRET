<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>VRM — A2F Animation Playback</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
  <style>
    html, body, #renderCanvas { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #111; }
    #info {
      position: fixed; top: 20px; left: 20px;
      color: white; font-family: monospace;
      background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px;
      pointer-events: none; font-size: 1.1em; z-index: 100;
      line-height: 1.6;
    }
    .highlight { color: #00ff00; font-weight: bold; }
    .dim       { color: #888; }
    #controls {
      position: fixed; bottom: 20px; left: 20px;
      background: rgba(0,0,0,0.8); padding: 15px; border-radius: 5px;
      z-index: 100; color: white; font-family: monospace;
      display: flex; gap: 10px; align-items: center;
    }
    button {
      background: #333; color: white; border: 1px solid #666;
      padding: 8px 16px; font-family: monospace; cursor: pointer;
      border-radius: 3px;
    }
    button:hover { background: #555; }
    button.active { background: #0a0; border-color: #0f0; }
    #progress-bar {
      width: 300px; height: 6px; background: #333; border-radius: 3px;
      cursor: pointer; position: relative;
    }
    #progress-fill {
      height: 100%; background: #0f0; border-radius: 3px; width: 0%;
      transition: width 0.05s linear;
    }
    #time-label { color: #aaa; font-size: 0.9em; min-width: 100px; }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="info">
    <div>VRM — A2F Playback</div>
    <div id="status">Loading…</div>
    <div id="anim-info" class="dim"></div>
    <div id="active-shapes" class="highlight"></div>
  </div>

  <div id="controls">
    <button id="btn-play">▶ Play</button>
    <button id="btn-stop">■ Stop</button>
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <span id="time-label">0:00 / 0:00</span>
  </div>

  <script type="module">

    // =========================================================================
    //  CONFIGURATION — edit these paths to match your setup
    // =========================================================================
    const VRM_FILE       = '../models/AIAN/AIAN_F_1_Casual.vrm';
    const ANIMATION_JSON = './frames.json';   // output of a2f_csv_to_json.py
    const AUDIO_FILE     = '../audio/altaforte.wav';           // the same audio you fed to A2F

    // =========================================================================
    //  Teeth morph targets driven alongside face shapes (from your original code)
    // =========================================================================
    const TEETH_MAP = {
      jawOpen:     'h_teeth.t_MouthOpen_h',
      mouthFunnel: 'h_teeth.t_Shout_h',
      mouthClose:  'h_teeth.t_MPB_h',
    };

    // =========================================================================
    //  DOM refs
    // =========================================================================
    const statusEl       = document.getElementById('status');
    const animInfoEl     = document.getElementById('anim-info');
    const activeShapesEl = document.getElementById('active-shapes');
    const btnPlay        = document.getElementById('btn-play');
    const btnStop        = document.getElementById('btn-stop');
    const progressBar    = document.getElementById('progress-bar');
    const progressFill   = document.getElementById('progress-fill');
    const timeLabel      = document.getElementById('time-label');

    // =========================================================================
    //  Load VRM loader
    // =========================================================================
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://xuhuisheng.github.io/babylonjs-vrm/babylon-vrm-loader.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });

    // =========================================================================
    //  Scene setup (identical to your original)
    // =========================================================================
    const canvas = document.getElementById('renderCanvas');
    const engine = new BABYLON.Engine(canvas, true);
    engine.setHardwareScalingLevel(1);
    const scene = new BABYLON.Scene(engine);

    const camera = new BABYLON.ArcRotateCamera('cam', -Math.PI / 2, Math.PI / 2 - 0.12, 1.5,
      new BABYLON.Vector3(0, 1.55, 0), scene);
    camera.attachControl(canvas, true);
    camera.lowerRadiusLimit = 0.3;
    camera.upperRadiusLimit = 8;

    new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);
    const dirLight = new BABYLON.DirectionalLight('dir', new BABYLON.Vector3(-1, -2, -1), scene);
    dirLight.intensity = 0.5;
    const fillLight = new BABYLON.PointLight('fill', new BABYLON.Vector3(0, 1.6, -1), scene);
    fillLight.intensity = 0.6;

    // =========================================================================
    //  Load VRM model
    // =========================================================================
    statusEl.textContent = 'Loading VRM…';
    await BABYLON.ImportMeshAsync(VRM_FILE, scene);
    statusEl.textContent = 'VRM loaded. Loading animation…';

    // =========================================================================
    //  Build morph target maps (identical to your original)
    // =========================================================================
    function buildMorphMap(mesh) {
      const map = new Map();
      const mgr = mesh?.morphTargetManager;
      if (!mgr) return map;
      for (let i = 0; i < mgr.numTargets; i++) {
        const t = mgr.getTarget(i);
        map.set(t.name, t);
      }
      return map;
    }

    const faceMesh      = scene.getMeshByName('H_DDS_HighRes');
    const teethDownMesh = scene.getMeshByName('h_TeethDown');
    const teethUpMesh   = scene.getMeshByName('h_TeethUp');
    const faceMap        = buildMorphMap(faceMesh);
    const teethDownMap   = buildMorphMap(teethDownMesh);
    const teethUpMap     = buildMorphMap(teethUpMesh);

    if (!faceMesh) {
      statusEl.textContent = 'Error: H_DDS_HighRes mesh not found';
    }

    // =========================================================================
    //  Apply a single blend shape (face + teeth)
    // =========================================================================
    function applyShape(name, value) {
      const ft = faceMap.get(name);
      if (ft) ft.influence = value;

      const teethName = TEETH_MAP[name];
      if (teethName) {
        const td = teethDownMap.get(teethName);
        const tu = teethUpMap.get(teethName);
        if (td) td.influence = value;
        if (tu) tu.influence = value;
      }
    }

    function resetAllShapes(names) {
      for (const name of names) applyShape(name, 0);
    }

    // =========================================================================
    //  Load animation JSON
    // =========================================================================
    let animData = null;
    try {
      const resp = await fetch(ANIMATION_JSON);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      animData = await resp.json();
      statusEl.textContent = `Loaded: ${animData.frameCount} frames, ${animData.blendShapeNames.length} shapes`;
      animInfoEl.textContent = `${(animData.frameCount / animData.fps).toFixed(1)}s @ ${animData.fps}fps`;

      // Log which A2F shapes are missing from the VRM
      const missing = animData.blendShapeNames.filter(n => !faceMap.has(n));
      if (missing.length) {
        console.warn('[A2F Playback] Shapes in JSON but missing from VRM:', missing);
      }
    } catch (e) {
      statusEl.textContent = `Failed to load animation: ${e.message}`;
      console.error(e);
    }

    // =========================================================================
    //  Audio setup
    // =========================================================================
    let audio = null;
    try {
      audio = new Audio(AUDIO_FILE);
      audio.preload = 'auto';
      await new Promise((resolve, reject) => {
        audio.addEventListener('canplaythrough', resolve, { once: true });
        audio.addEventListener('error', () => reject(new Error('Audio load failed')), { once: true });
      });
    } catch (e) {
      console.warn('[A2F Playback] Audio not loaded — will play animation without sound.', e.message);
      audio = null;
    }

    // =========================================================================
    //  Playback state
    // =========================================================================
    let isPlaying = false;
    let playbackTime = 0;  // seconds — used when no audio is available

    function getCurrentTime() {
      if (audio) return audio.currentTime;
      return playbackTime;
    }

    function getDuration() {
      if (animData) return animData.frameCount / animData.fps;
      return 0;
    }

    function formatTime(secs) {
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    // =========================================================================
    //  Playback controls
    // =========================================================================
    function play() {
      if (!animData) return;
      isPlaying = true;
      btnPlay.classList.add('active');
      if (audio) audio.play();
    }

    function stop() {
      isPlaying = false;
      btnPlay.classList.remove('active');
      if (audio) { audio.pause(); audio.currentTime = 0; }
      playbackTime = 0;
      if (animData) resetAllShapes(animData.blendShapeNames);
      progressFill.style.width = '0%';
      timeLabel.textContent = `0:00 / ${formatTime(getDuration())}`;
      activeShapesEl.textContent = '';
    }

    btnPlay.addEventListener('click', () => {
      if (isPlaying) {
        isPlaying = false;
        btnPlay.classList.remove('active');
        if (audio) audio.pause();
      } else {
        play();
      }
    });
    btnStop.addEventListener('click', stop);

    // Scrub via progress bar
    progressBar.addEventListener('click', (e) => {
      const pct = e.offsetX / progressBar.offsetWidth;
      const t = pct * getDuration();
      if (audio) audio.currentTime = t;
      playbackTime = t;
    });

    // =========================================================================
    //  Frame lookup — find the right frame for a given time
    // =========================================================================
    function getFrameAtTime(t) {
      if (!animData || animData.frames.length === 0) return null;

      // Fast path: direct index from fps
      const idx = Math.floor(t * animData.fps);
      if (idx < 0) return animData.frames[0];
      if (idx >= animData.frames.length) return null;  // past end
      return animData.frames[idx];
    }

    // =========================================================================
    //  Render loop — apply A2F animation per frame
    // =========================================================================
    let lastRenderMs = performance.now();

    scene.onBeforeRenderObservable.add(() => {
      if (!animData || !isPlaying) return;

      // Advance playback time if no audio
      const now = performance.now();
      const dt = (now - lastRenderMs) / 1000;
      lastRenderMs = now;
      if (!audio) playbackTime += dt;

      const t = getCurrentTime();
      const duration = getDuration();

      // Auto-stop at end
      if (t >= duration) {
        stop();
        return;
      }

      // Get frame
      const frame = getFrameAtTime(t);
      if (!frame) return;

      // Apply all blend shape weights
      const names = animData.blendShapeNames;
      const weights = frame.weights;
      let topShape = '';
      let topVal = 0;

      for (let i = 0; i < names.length; i++) {
        const w = weights[i] || 0;
        applyShape(names[i], w);

        if (w > topVal) {
          topVal = w;
          topShape = names[i];
        }
      }

      // Update UI
      progressFill.style.width = `${(t / duration * 100).toFixed(1)}%`;
      timeLabel.textContent = `${formatTime(t)} / ${formatTime(duration)}`;
      if (topVal > 0.01) {
        activeShapesEl.textContent = `${topShape}: ${topVal.toFixed(2)}`;
      } else {
        activeShapesEl.textContent = '';
      }
    });

    // =========================================================================
    //  Render loop
    // =========================================================================
    engine.runRenderLoop(() => scene.render());
    window.addEventListener('resize', () => engine.resize());

    // Initial UI
    timeLabel.textContent = `0:00 / ${formatTime(getDuration())}`;
    if (animData) statusEl.textContent = 'Ready — press Play';

  </script>
</body>
</html>
